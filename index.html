<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成績計算系統 - 自訂權重版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.6em;
            vertical-align: middle;
            margin-left: 10px;
        }

        .upload-section {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px;
            border: 3px dashed #667eea;
            border-radius: 15px;
            background: #f8f9ff;
            transition: all 0.3s;
        }

        .upload-section:hover {
            border-color: #764ba2;
            background: #f0f1ff;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
        }

        .file-input-label {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: bold;
            transition: transform 0.3s;
        }

        .file-input-label:hover {
            transform: scale(1.05);
        }

        input[type="file"] {
            display: none;
        }

        .control-section {
            margin: 30px 0;
            padding: 25px;
            background: linear-gradient(135deg, #fff5f5 0%, #f8f0ff 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: space-between;
            border: 2px solid #f5576c;
        }

        .control-left {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .control-right {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-group label {
            font-weight: bold;
            color: #555;
            font-size: 1.1em;
            white-space: nowrap;
        }

        .control-group input {
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            width: 80px;
            transition: border-color 0.3s;
        }

        .control-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .weight-group {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 20px;
            background: white;
            border-radius: 10px;
            border: 2px solid #667eea;
        }

        .weight-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .weight-item label {
            font-weight: bold;
            color: #333;
            font-size: 1em;
        }

        .weight-item input {
            width: 70px;
            padding: 8px 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            text-align: center;
        }

        .weight-percent {
            color: #666;
            font-size: 0.9em;
        }

        .weight-total {
            font-weight: bold;
            color: #f5576c;
            font-size: 1.1em;
            padding: 0 10px;
        }

        .control-hint {
            color: #f5576c;
            font-size: 0.9em;
            font-style: italic;
            margin-left: 10px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            white-space: nowrap;
        }

        .btn-calculate {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-calculate:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(245,87,108,0.4);
        }

        .btn-export {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .btn-export:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(79,172,254,0.4);
        }

        .btn-reset {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: #333;
        }

        .btn-reset:hover {
            transform: scale(1.05);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .info-box {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .info-item {
            flex: 1;
            min-width: 200px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
        }

        .info-item span {
            display: block;
            font-size: 2em;
            margin-top: 10px;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            max-height: 600px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            min-width: 800px;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 0.9em;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.3);
        }

        th.selected-score {
            background: rgba(255,215,0,0.3);
            color: #ffd700;
        }

        td {
            padding: 12px;
            text-align: center;
            border: 1px solid #ddd;
        }

        tbody tr:nth-child(even) {
            background: #f8f9ff;
        }

        tbody tr:hover {
            background: #e8e9ff;
        }

        .highlight {
            background: #fff3cd !important;
            font-weight: bold;
        }

        .selected-cell {
            background: #fff9c4 !important;
            font-weight: bold;
            color: #f57f17;
        }

        .no-data {
            text-align: center;
            padding: 50px;
            color: #999;
            font-size: 1.2em;
        }

        .success-message {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            animation: slideIn 0.5s ease;
            z-index: 1000;
        }

        .selected-info {
            background: linear-gradient(135deg, #fff9c4 0%, #fff3e0 100%);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            border-left: 4px solid #ffc107;
            color: #e65100;
            font-weight: bold;
        }

        .export-preview {
            background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 100%);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            border-left: 4px solid #2196f3;
            color: #1565c0;
        }

        .formula-display {
            background: linear-gradient(135deg, #e8f5e8 0%, #f1f8e9 100%);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            border-left: 4px solid #4caf50;
            color: #2e7d32;
            font-size: 1.1em;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .control-section {
                flex-direction: column;
                align-items: stretch;
            }
            
            .control-left, .control-right {
                flex-direction: column;
                width: 100%;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            📊 成績計算系統
            <span class="badge">⚖️ 自訂權重版</span>
        </h1>
        
        <div class="upload-section">
            <div class="file-input-wrapper">
                <label for="fileInput" class="file-input-label">
                    📁 選擇 Excel 檔案
                </label>
                <input type="file" id="fileInput" accept=".xlsx,.xls">
            </div>
            <p style="margin-top: 15px; color: #666;">支援 .xlsx 格式，空白格子自動視為 0 分</p>
        </div>

        <div id="infoSection" style="display: none;">
            <div class="info-box">
                <div class="info-item">
                    班級數
                    <span id="classCount">0</span>
                </div>
                <div class="info-item">
                    學生數
                    <span id="studentCount">0</span>
                </div>
                <div class="info-item">
                    平時成績總次數
                    <span id="regularCount">0</span>
                </div>
                <div class="info-item">
                    作業成績次數
                    <span id="homeworkCount">0</span>
                </div>
            </div>

            <div class="control-section">
                <div class="control-left">
                    <div class="control-group">
                        <label for="selectCount">🏆 取最高分幾次：</label>
                        <input type="number" id="selectCount" min="1" value="1" placeholder="次數">
                    </div>
                    
                    <div class="weight-group">
                        <span style="font-weight: bold; color: #333;">⚖️ 權重設定：</span>
                        <div class="weight-item">
                            <label for="regularWeight">平時成績：</label>
                            <input type="number" id="regularWeight" min="0" max="100" value="50" step="1">
                            <span class="weight-percent">%</span>
                        </div>
                        <div class="weight-item">
                            <label for="homeworkWeight">作業成績：</label>
                            <input type="number" id="homeworkWeight" min="0" max="100" value="50" step="1">
                            <span class="weight-percent">%</span>
                        </div>
                        <span class="weight-total" id="weightTotal">= 100%</span>
                    </div>
                </div>
                <div class="control-right">
                    <button class="btn btn-calculate" onclick="calculateScores()">🎯 結算總成績</button>
                    <button class="btn btn-export" id="exportBtn" onclick="exportToExcel()" disabled>💾 匯出 Excel</button>
                    <button class="btn btn-reset" onclick="resetAll()">🔄 重新開始</button>
                </div>
            </div>
        </div>

        <div id="tableSection" style="display: none;">
            <div id="formulaDisplaySection"></div>
            <div id="selectedInfoSection"></div>
            <div id="exportPreviewSection"></div>
            <div class="table-container">
                <table id="scoreTable">
                    <thead id="tableHeader"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="noDataMessage" class="no-data">
            請上傳 Excel 檔案開始使用
        </div>
    </div>

    <script>
        let excelData = [];
        let headers = [];
        let regularStartIndex = 3; // 平時成績開始欄位索引
        let homeworkStartIndex = -3; // 作業成績開始欄位索引（倒數第3欄）
        let calculatedResults = null; // 儲存計算結果
        let selectedRegularCount = 0; // 儲存選擇的平時成績次數
        let selectedIndexes = []; // 儲存每個學生被選中的平時成績索引
        let regularWeightValue = 50; // 平時成績權重
        let homeworkWeightValue = 50; // 作業成績權重

        // 監聽權重輸入變化
        document.getElementById('regularWeight').addEventListener('input', updateWeightTotal);
        document.getElementById('homeworkWeight').addEventListener('input', updateWeightTotal);

        function updateWeightTotal() {
            const regularWeight = parseInt(document.getElementById('regularWeight').value) || 0;
            const homeworkWeight = parseInt(document.getElementById('homeworkWeight').value) || 0;
            const total = regularWeight + homeworkWeight;
            
            const weightTotalElement = document.getElementById('weightTotal');
            if (total === 100) {
                weightTotalElement.textContent = '= 100% ✅';
                weightTotalElement.style.color = '#4caf50';
            } else {
                weightTotalElement.textContent = `= ${total}% ❌`;
                weightTotalElement.style.color = '#f44336';
            }
        }

        // 檔案讀取
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet, {header: 1, defval: 0});
                    
                    processExcelData(jsonData);
                } catch (error) {
                    alert('檔案讀取失敗，請確認格式是否正確！\n' + error.message);
                }
            };
            reader.readAsArrayBuffer(file);
        });

        function processExcelData(jsonData) {
            if (jsonData.length < 2) {
                alert('檔案至少需要包含標題列和資料列！');
                return;
            }

            // 第一列為標題
            headers = jsonData[0].map(h => h !== null && h !== undefined ? String(h) : '');
            
            // 資料從第二列開始
            excelData = jsonData.slice(1).filter(row => {
                // 過濾掉完全空白的行
                return row.some(cell => cell !== null && cell !== undefined && cell !== '' && cell !== 0);
            });

            // 分析結構
            analyzeStructure();

            // 清除之前的計算結果
            calculatedResults = null;
            selectedIndexes = [];
            document.getElementById('exportBtn').disabled = true;
            document.getElementById('selectedInfoSection').innerHTML = '';
            document.getElementById('exportPreviewSection').innerHTML = '';
            document.getElementById('formulaDisplaySection').innerHTML = '';

            // 顯示資料
            document.getElementById('noDataMessage').style.display = 'none';
            document.getElementById('infoSection').style.display = 'block';
            document.getElementById('tableSection').style.display = 'block';
            
            updateInfo();
            renderTable();
        }

        function analyzeStructure() {
            if (headers.length < 6) {
                alert('欄位數量不足！至少需要：班級、座號、姓名、平時成績(至少1欄)、作業成績(3欄)');
                return;
            }

            // 前3欄：班級、座號、姓名
            // 中間：平時成績
            // 最後3欄：作業成績
            regularStartIndex = 3;
            homeworkStartIndex = headers.length - 3;
            
            // 計算平時成績的欄位數
            const regularCount = homeworkStartIndex - regularStartIndex;
            
            if (regularCount < 1) {
                alert('平時成績至少需要1欄！');
                return;
            }
        }

        function updateInfo() {
            const regularCount = homeworkStartIndex - regularStartIndex;
            document.getElementById('classCount').textContent = new Set(excelData.map(row => row[0])).size;
            document.getElementById('studentCount').textContent = excelData.length;
            document.getElementById('regularCount').textContent = regularCount;
            document.getElementById('homeworkCount').textContent = 3;
            
            // 設定平時成績次數的最大值與預設值
            const selectCountInput = document.getElementById('selectCount');
            selectCountInput.max = regularCount;
            selectCountInput.value = Math.min(regularCount, 3); // 預設取最高3次
            selectCountInput.min = 1;
        }

        function getTopScoresIndexes(row, count) {
            // 取得某個學生最高分幾次平時成績的索引
            const scores = [];
            for (let i = regularStartIndex; i < homeworkStartIndex; i++) {
                scores.push({
                    index: i,
                    score: parseFloat(row[i]) || 0
                });
            }
            
            // 依照分數由高到低排序
            scores.sort((a, b) => b.score - a.score);
            
            // 回傳前 count 個最高分的索引（保持原始順序）
            const topIndexes = scores.slice(0, count).map(item => item.index);
            // 按照原始索引排序，保持成績出現的順序
            topIndexes.sort((a, b) => a - b);
            
            return topIndexes;
        }

        function renderTable(calculatedData = null) {
            const thead = document.getElementById('tableHeader');
            const tbody = document.getElementById('tableBody');
            
            // 渲染表頭
            let headerHTML = '<tr>';
            
            if (calculatedData) {
                // 計算結果的表頭
                headerHTML += `<th>班級</th><th>座號</th><th>姓名</th>`;
                
                // 所有平時成績（標記被選中的）
                for (let i = regularStartIndex; i < homeworkStartIndex; i++) {
                    const isSelected = selectedIndexes[0] && selectedIndexes[0].includes(i);
                    headerHTML += `<th class="${isSelected ? 'selected-score' : ''}">${headers[i]} ${isSelected ? '⭐' : ''}</th>`;
                }
                headerHTML += `<th>平時成績平均</th>`;
                
                // 作業成績
                for (let i = homeworkStartIndex; i < headers.length; i++) {
                    headerHTML += `<th>${headers[i]}</th>`;
                }
                headerHTML += `<th>作業成績平均</th>`;
                headerHTML += `<th style="background:#f5576c;">總成績</th>`;
            } else {
                // 原始資料的表頭
                headers.forEach(header => {
                    headerHTML += `<th>${header}</th>`;
                });
            }
            
            headerHTML += '</tr>';
            thead.innerHTML = headerHTML;

            // 渲染資料
            let bodyHTML = '';
            const dataToRender = calculatedData || excelData;
            
            dataToRender.forEach((row, index) => {
                bodyHTML += '<tr>';
                
                if (calculatedData && row.regularAvg !== undefined) {
                    // 計算結果的資料
                    bodyHTML += `<td>${row[0]}</td>`; // 班級
                    bodyHTML += `<td>${row[1]}</td>`; // 座號
                    bodyHTML += `<td>${row[2]}</td>`; // 姓名
                    
                    // 所有平時成績（標記被選中的）
                    const studentSelected = selectedIndexes[index] || [];
                    for (let i = regularStartIndex; i < homeworkStartIndex; i++) {
                        const isSelected = studentSelected.includes(i);
                        bodyHTML += `<td class="${isSelected ? 'selected-cell' : ''}">${row[i] || 0}</td>`;
                    }
                    bodyHTML += `<td><strong>${row.regularAvg.toFixed(2)}</strong></td>`;
                    
                    // 作業成績
                    for (let i = homeworkStartIndex; i < headers.length; i++) {
                        bodyHTML += `<td>${row[i] || 0}</td>`;
                    }
                    bodyHTML += `<td><strong>${row.homeworkAvg.toFixed(2)}</strong></td>`;
                    bodyHTML += `<td class="highlight"><strong>${row.totalScore.toFixed(2)}</strong></td>`;
                } else {
                    // 原始資料
                    for (let i = 0; i < headers.length; i++) {
                        const value = row[i] !== undefined && row[i] !== null ? row[i] : 0;
                        bodyHTML += `<td>${value}</td>`;
                    }
                }
                
                bodyHTML += '</tr>';
            });
            
            tbody.innerHTML = bodyHTML;
        }

        function calculateScores() {
            if (excelData.length === 0) {
                alert('請先匯入 Excel 檔案！');
                return;
            }

            selectedRegularCount = parseInt(document.getElementById('selectCount').value);
            regularWeightValue = parseInt(document.getElementById('regularWeight').value) || 0;
            homeworkWeightValue = parseInt(document.getElementById('homeworkWeight').value) || 0;
            
            const regularCount = homeworkStartIndex - regularStartIndex;
            
            // 驗證輸入
            if (isNaN(selectedRegularCount) || selectedRegularCount < 1) {
                alert('請輸入有效的平時成績次數！');
                return;
            }
            
            if (selectedRegularCount > regularCount) {
                alert(`平時成績總共只有 ${regularCount} 次，不能選取 ${selectedRegularCount} 次！`);
                return;
            }

            if (regularWeightValue + homeworkWeightValue !== 100) {
                alert('平時成績權重 + 作業成績權重必須等於 100%！\n目前總和為 ' + (regularWeightValue + homeworkWeightValue) + '%');
                return;
            }

            // 為每個學生找出最高分的幾次
            selectedIndexes = excelData.map(row => getTopScoresIndexes(row, selectedRegularCount));

            // 計算成績
            calculatedResults = excelData.map((row, studentIndex) => {
                const newRow = [...row];
                
                // 計算平時成績平均（使用被選中的最高分）
                const studentSelected = selectedIndexes[studentIndex];
                const regularScores = studentSelected.map(i => parseFloat(row[i]) || 0);
                const regularAvg = regularScores.reduce((a, b) => a + b, 0) / selectedRegularCount;
                
                // 計算作業成績平均（最後3欄）
                const homeworkScores = [];
                for (let i = homeworkStartIndex; i < headers.length; i++) {
                    const score = parseFloat(row[i]) || 0;
                    homeworkScores.push(score);
                }
                const homeworkAvg = homeworkScores.reduce((a, b) => a + b, 0) / 3;
                
                // 總成績 = 平時平均 * 平時權重 + 作業平均 * 作業權重
                const totalScore = (regularAvg * regularWeightValue / 100) + (homeworkAvg * homeworkWeightValue / 100);
                
                newRow.regularAvg = regularAvg;
                newRow.homeworkAvg = homeworkAvg;
                newRow.totalScore = totalScore;
                newRow.selectedIndexes = studentSelected;
                
                return newRow;
            });

            // 啟用匯出按鈕
            document.getElementById('exportBtn').disabled = false;
            
            // 顯示公式
            showFormula();
            // 顯示選擇資訊
            showSelectedInfo();
            showExportPreview();
            
            renderTable(calculatedResults);
        }

        function showFormula() {
            const formulaSection = document.getElementById('formulaDisplaySection');
            
            let formulaHTML = '<div class="formula-display">';
            formulaHTML += '🧮 <strong>目前計算公式：</strong><br>';
            formulaHTML += `總成績 = 平時成績平均 × ${regularWeightValue}% + 作業成績平均 × ${homeworkWeightValue}%<br>`;
            formulaHTML += '平時成績平均 = 最高 ' + selectedRegularCount + ' 次平時成績的平均值<br>';
            formulaHTML += '作業成績平均 = 3 次作業成績的平均值';
            formulaHTML += '</div>';
            
            formulaSection.innerHTML = formulaHTML;
        }

        function showSelectedInfo() {
            const infoSection = document.getElementById('selectedInfoSection');
            
            // 統計哪些平時成績被選中的次數
            const selectionStats = {};
            for (let i = regularStartIndex; i < homeworkStartIndex; i++) {
                selectionStats[i] = 0;
            }
            
            selectedIndexes.forEach(studentSelected => {
                studentSelected.forEach(i => {
                    selectionStats[i]++;
                });
            });
            
            let infoHTML = '<div class="selected-info">';
            infoHTML += `📊 <strong>平時成績選擇統計</strong>（共取最高 ${selectedRegularCount} 次）：<br>`;
            
            for (let i = regularStartIndex; i < homeworkStartIndex; i++) {
                const percentage = ((selectionStats[i] / excelData.length) * 100).toFixed(1);
                infoHTML += `• ${headers[i]}：被 ${selectionStats[i]} 位學生選中（${percentage}%）<br>`;
            }
            
            infoHTML += '</div>';
            infoSection.innerHTML = infoHTML;
        }

        function showExportPreview() {
            const previewSection = document.getElementById('exportPreviewSection');
            
            let previewHTML = '<div class="export-preview">';
            previewHTML += '💾 <strong>匯出預覽：</strong>匯出的 Excel 檔案將<strong>只包含</strong>每位學生被選中的最高分平時成績<br>';
            previewHTML += '📋 匯出欄位：班級 | 座號 | 姓名 | ';
            
            // 顯示被選中的平時成績標題
            if (selectedIndexes.length > 0 && selectedIndexes[0].length > 0) {
                const firstStudentSelected = selectedIndexes[0];
                previewHTML += firstStudentSelected.map(i => headers[i]).join(' | ') + ' | ';
            }
            
            previewHTML += '平時成績平均 | 作業成績1 | 作業成績2 | 作業成績3 | 作業成績平均 | 總成績';
            previewHTML += '</div>';
            
            previewSection.innerHTML = previewHTML;
        }

        function exportToExcel() {
            if (!calculatedResults) {
                alert('請先結算總成績！');
                return;
            }

            // 建立匯出資料
            const exportData = [];
            
            // 建立表頭 - 只包含被選中的平時成績
            const headerRow = ['班級', '座號', '姓名'];
            
            // 只加入被選中的平時成績標題（使用第一個學生的選擇作為參考）
            if (selectedIndexes.length > 0) {
                const firstStudentSelected = selectedIndexes[0];
                firstStudentSelected.forEach(i => {
                    headerRow.push(headers[i]);
                });
            }
            headerRow.push('平時成績平均');
            
            // 加入作業成績標題
            for (let i = homeworkStartIndex; i < headers.length; i++) {
                headerRow.push(headers[i]);
            }
            headerRow.push('作業成績平均');
            headerRow.push('總成績');
            
            // 加入權重資訊列
            const weightInfoRow = ['', '', '權重設定：'];
            if (selectedIndexes.length > 0) {
                for (let i = 0; i < selectedRegularCount; i++) {
                    weightInfoRow.push('');
                }
            }
            weightInfoRow.push(`平時成績佔 ${regularWeightValue}%`);
            weightInfoRow.push('', '', '');
            weightInfoRow.push(`作業成績佔 ${homeworkWeightValue}%`);
            weightInfoRow.push(`計算公式：平時平均×${regularWeightValue}% + 作業平均×${homeworkWeightValue}%`);
            
            exportData.push(headerRow);
            exportData.push(weightInfoRow);

            // 加入資料
            calculatedResults.forEach((row, studentIndex) => {
                const dataRow = [];
                
                // 基本資料
                dataRow.push(row[0]); // 班級
                dataRow.push(row[1]); // 座號
                dataRow.push(row[2]); // 姓名
                
                // 只加入被選中的最高分平時成績
                const studentSelected = selectedIndexes[studentIndex] || [];
                studentSelected.forEach(i => {
                    dataRow.push(parseFloat(row[i]) || 0);
                });
                dataRow.push(parseFloat(row.regularAvg.toFixed(2)));
                
                // 作業成績
                for (let i = homeworkStartIndex; i < headers.length; i++) {
                    dataRow.push(parseFloat(row[i]) || 0);
                }
                dataRow.push(parseFloat(row.homeworkAvg.toFixed(2)));
                
                // 總成績
                dataRow.push(parseFloat(row.totalScore.toFixed(2)));
                
                exportData.push(dataRow);
            });

            // 建立工作表
            const ws = XLSX.utils.aoa_to_sheet(exportData);
            
            // 設定欄寬
            const colWidths = [
                {wch: 10}, // 班級
                {wch: 8},  // 座號
                {wch: 10}, // 姓名
            ];
            
            // 被選中的平時成績欄位
            for (let i = 0; i < selectedRegularCount; i++) {
                colWidths.push({wch: 14});
            }
            colWidths.push({wch: 18}); // 平時成績平均
            
            // 作業成績欄位
            for (let i = 0; i < 3; i++) {
                colWidths.push({wch: 14});
            }
            colWidths.push({wch: 18}); // 作業成績平均
            colWidths.push({wch: 14}); // 總成績
            
            ws['!cols'] = colWidths;

            // 建立活頁簿
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "成績結算結果");
            
            // 下載檔案
            const fileName = `成績結算結果_平時${regularWeightValue}%_作業${homeworkWeightValue}%_${new Date().toISOString().slice(0, 10)}.xlsx`;
            XLSX.writeFile(wb, fileName);
            
            // 顯示成功訊息
            showSuccessMessage(`✅ 檔案匯出成功！（平時成績權重 ${regularWeightValue}%，作業成績權重 ${homeworkWeightValue}%）`);
        }

        function showSuccessMessage(message) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'success-message';
            messageDiv.textContent = message;
            document.body.appendChild(messageDiv);
            
            setTimeout(() => {
                messageDiv.remove();
            }, 3000);
        }

        function resetAll() {
            excelData = [];
            headers = [];
            calculatedResults = null;
            selectedIndexes = [];
            document.getElementById('fileInput').value = '';
            document.getElementById('infoSection').style.display = 'none';
            document.getElementById('tableSection').style.display = 'none';
            document.getElementById('noDataMessage').style.display = 'block';
            document.getElementById('tableHeader').innerHTML = '';
            document.getElementById('tableBody').innerHTML = '';
            document.getElementById('exportBtn').disabled = true;
            document.getElementById('selectedInfoSection').innerHTML = '';
            document.getElementById('exportPreviewSection').innerHTML = '';
            document.getElementById('formulaDisplaySection').innerHTML = '';
            document.getElementById('regularWeight').value = '50';
            document.getElementById('homeworkWeight').value = '50';
            document.getElementById('weightTotal').textContent = '= 100%';
            document.getElementById('weightTotal').style.color = '#f5576c';
        }
    </script>
</body>
</html>
